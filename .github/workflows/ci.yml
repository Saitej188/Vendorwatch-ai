name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python files
        run: |
          python -m py_compile dashboard/app.py streamlit_app.py api/main.py database/db.py pipeline/run_pipeline.py scraper/jobs_scraper.py cleaning/clean_jobs.py ml/insights.py ml/report.py

      - name: Smoke test imports
        run: |
          python -c "import streamlit, pandas, sqlalchemy, fastapi, requests"
