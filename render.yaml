services:
  - type: web
    name: vendorwatch-ai
    env: python
    plan: starter

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"