services:
  - type: web
    name: vendorwatch-ai
    env: python
    runtime: python-3.11.9
    branch: main
    plan: starter

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.enableCORS false

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"